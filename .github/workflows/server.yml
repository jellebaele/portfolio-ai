name: Build and Push Server

on:
  push:
    paths:
      - 'server/**'
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/ai-portfolio-server:latest \
            -t ghcr.io/${{ github.repository_owner }}/ai-portfolio-server:${{ github.sha }} \
            ./server

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ai-portfolio-server:latest
          docker push ghcr.io/${{ github.repository_owner }}/ai-portfolio-server:${{ github.sha }}
